[pytest]
# ── Test discovery ──────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio ─────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Timeouts ────────────────────────────────────────────────────────────────
# Individual test timeout (seconds).  Prevents a hung network call from
# blocking the entire CI run.
timeout = 60

# ── Output ──────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    -q
    --continue-on-collection-errors
    --ignore=tests/test_data_validator.py

# ── Markers ─────────────────────────────────────────────────────────────────
markers =
    integration: marks tests as integration tests (may require external services)
    unit: marks tests as pure unit tests (no external dependencies)
    slow: marks tests that take longer than usual
    optional: marks tests as optional (skipped on import/infrastructure errors)
