version: "3.9"

services:
  gold-signals:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-gold_signals_v3}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_GOLD_CHANNEL_ID=${TELEGRAM_GOLD_CHANNEL_ID}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SIGNAL_INTERVAL_MINUTES=${SIGNAL_INTERVAL_MINUTES:-30}
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-65}
      - ACCOUNT_BALANCE=${ACCOUNT_BALANCE:-100000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=gold_signals_v3
    restart: unless-stopped

volumes:
  mongo_data:
