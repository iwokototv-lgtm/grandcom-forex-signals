name: CI/CD Pipeline - Bug Prevention & Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov flake8 mypy bandit
    
    # Linting
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    # Type checking
    - name: Type check with mypy
      run: |
        mypy backend/ --ignore-missing-imports --no-error-summary || true
    
    # Security scan
    - name: Security scan with bandit
      run: |
        bandit -r backend/ -f json -o bandit-report.json || true
    
    # Unit tests
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=backend --cov-report=xml --cov-report=html
    
    # Upload coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    # Data validation tests
    - name: Run data validation tests
      run: |
        pytest tests/test_data_validator.py -v
    
    # Integration tests
    - name: Run integration tests
      run: |
        pytest tests/test_integration.py -v || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: grandcom-gold-signals:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        npm install -g @railway/cli
        railway up --service serene-growth
    
    - name: Run post-deployment tests
      run: |
        echo "Running health checks..."
        curl -f http://localhost:8080/api/health || exit 1
    
    - name: Notify deployment
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "Version: ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"

  notify:
    needs: [test, security, build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Send Telegram notification
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🔄 CI/CD Pipeline Status
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          
          Tests: ${{ needs.test.result }}
          Security: ${{ needs.security.result }}
          Build: ${{ needs.build.result }}
          
          View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

